<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #2f2f2f;
    }

    .login-card {
      max-width: 400px;
      width: 90%;
      background: #ffffff;
      padding: 30px;
      border-radius: 6px;
      border: 1px solid #dcdcdc;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      text-align: left;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 22px;
      color: #1a1a1a;
      text-align: center;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #333333;
    }


    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      border-radius: 3px;
    }

    input:focus {
      outline: none;
      border-color: #00319f;
    }

    button {
      margin-top: 18px;
      padding: 9px;
      width: 100%;
      font-size: 14px;
      font-weight: 600;
      background: #00319f;
      color: #ffffff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    button:hover {
      background: #00319f;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Change Your Password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}

      <div class="form-group">
        {{ form.old_password.label_tag }}
        {{ form.old_password }}
      </div>

      <div class="form-group">
        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}
      </div>

      <div class="form-group">
        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}
      </div>

      <button type="submit">Update Password</button>
    </form>
  </div>
</body>
</html>
