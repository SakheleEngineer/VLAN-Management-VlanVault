<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  {% load static %}
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #2f2f2f;
    }

    .page-wrapper {
      text-align: center;
      width: 100%;

    }

    .logo img {
      max-width: 250px;
      margin-bottom: 30px;
      margin-top: -70px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #1a1a1a;
    }

    .login-card {
      max-width: 400px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 6px;
      border: 1px solid #dcdcdc;
      text-align: left;
    }

    .login-card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
      text-align: center;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      display: block;
      color: #333333;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #bdbdbd;
      border-radius: 3px;
    }

    input:focus {
      outline: none;
      border-color: #00319f;
    }

    button {
      margin-top: 18px;
      padding: 9px;
      width: 100%;
      font-size: 14px;
      font-weight: 600;
      background: #00319f;
      color: #ffffff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    button:hover {
      background: #00319f;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <div class="logo">
      <img src="{% static 'logo.png' %}" width="30%" alt="COMSOL">
    </div>
     <br>

   
    <p><small>Comsol Tag Database Management System</small></p>

    <div class="login-card">
      <h2>User Login</h2>

      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div class="form-group">
          {{ form.username.label_tag }}
          {{ form.username }}
        </div>

        <div class="form-group">
          {{ form.password.label_tag }}
          {{ form.password }}
        </div>

        <button type="submit">Sign In</button>
      </form>
    </div>
    <br>
    <h1> <img src="{% static 'Comsol_BM.png' %}"  width="5%"  alt="COMSOL"></h1>
    <p><small>&copy; 2023 COMSOL. All rights reserved.</small></p>

  </div>
</body>
</html>
