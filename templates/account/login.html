<!DOCTYPE html>
<html>
<head>
   {% load static %}
   
    <title>Login - VLAN Management System - COMSOL-VLAN-VAULT</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ===== BASE ===== */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #1f2937;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== LOGIN CARD ===== */
        .login-container {
            width: 420px;
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
			border: 0.01px solid white;
			
        }

        .login-header {
            background: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .login-header img {
            width: 120px;
            margin-bottom: 10px;
        }

        .login-header h4 {
            margin: 0;
            font-weight: 600;
        }

        /* ===== FORM ===== */
        .login-body {
            padding: 30px;
        }

        .form-control {
            height: 42px;
            border-radius: 6px;
            border: 1px solid #c5c8ce;
            font-size: 14px;
            background: #f4f6f9;
        }

        .form-control:focus {
            border-color: #2f2f4f;
            box-shadow: none;
        }

        .input-group-text {
            background: #e9edf2;
            border: 1px solid #c5c8ce;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(90deg, #2f2f4f, #1f2937);
            border: none;
            color: white;
            padding: 10px;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .login-footer {
            text-align: center;
            font-size: 12px;
            color: #6b7280;
            margin-top: 15px;
        }

        .toggle-password {
            cursor: pointer;
        }

        /* subtle animation */
        .login-container {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="login-container">
   

    <!-- HEADER -->
    <div class="login-header">
        <img src="{% static 'logo.png' %}" width="100%" alt="COMSOL-VLAN-VAULT">
        <h4>Login</h4>
        <small style="opacity:0.8;">VLAN-DB Management System</small>
    </div>

    <!-- BODY -->
    <div class="login-body">

        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                    <span class="input-group-text toggle-password" onclick="togglePassword()">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <!-- Remember -->
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-login">
                Login
            </button>

        </form>

        <div class="login-footer">
            © 2026 COMSOL. All rights reserved.
        </div>

    </div>
</div>



<!-- JS -->
<script>
    function togglePassword() {
        const password = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            password.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
