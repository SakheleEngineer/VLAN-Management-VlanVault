{% extends 'home.html' %}

{% block content %}

<!-- Page Loader -->
<div id="page-loader">
    <div class="spinner-border text-primary" role="status">
        <span class="sr-only">Loading...</span>
    </div>
</div>
<div class="row">
<div class="col-md-12">
      <header class="topbar">
          <h5 class="mt-1">DATA CENTERS</h5>
            <div class="search-box">
                <input type="text" class="form-control" id="vlan-search" placeholder="Search tag ...">
                <button class="btn btn-sm signout-btn ml-2">Sign out</button>
            </div>
        </header>
        
        <!-- Tabs -->
        <div class="tabs mt-2">
            <ul class="nav nav-pills">
                  <li class="nav-item">
                      <!-- FIXED: data-target -->
                    <button type="button"
                            class="btn btn-custom-blue  w-100 d-flex align-items-center justify-content-center "
                            id="newDataCenterBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-database-fill-add me-2 mr-2" viewBox="0 0 16 16">
                            <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 0 1-1 0v-1h-1a.5.5 0 0 1 0-1h1v-1a.5.5 0 0 1 1 0"/>
                            <path d="M8 1c-1.573 0-3.022.289-4.096.777C2.875 2.245 2 2.993 2 4s.875 1.755 1.904 2.223C4.978 6.711 6.427 7 8 7s3.022-.289 4.096-.777C13.125 5.755 14 5.007 14 4s-.875-1.755-1.904-2.223C11.022 1.289 9.573 1 8 1"/>
                            <path d="M2 7v-.839c.457.432 1.004.751 1.49.972C4.722 7.693 6.318 8 8 8s3.278-.307 4.51-.867c.486-.22 1.033-.54 1.49-.972V7c0 .424-.155.802-.411 1.133a4.51 4.51 0 0 0-4.815 1.843A12 12 0 0 1 8 10c-1.573 0-3.022-.289-4.096-.777C2.875 8.755 2 8.007 2 7m6.257 3.998L8 11c-1.682 0-3.278-.307-4.51-.867-.486-.22-1.033-.54-1.49-.972V10c0 1.007.875 1.755 1.904 2.223C4.978 12.711 6.427 13 8 13h.027a4.55 4.55 0 0 1 .23-2.002m-.002 3L8 14c-1.682 0-3.278-.307-4.51-.867-.486-.22-1.033-.54-1.49-.972V13c0 1.007.875 1.755 1.904 2.223C4.978 15.711 6.427 16 8 16c.536 0 1.058-.034 1.555-.097a4.5 4.5 0 0 1-1.3-1.905"/>
                            </svg>
                            New Data Center
                    </button>   
                </li>
            </ul>
        </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Region</th>
                </tr>
            </thead>
            <tbody>
            {% for dc in datacenters %}
                <tr class="datacenter-row"
                    data-id="{{ dc.id }}"
                    data-name="{{ dc.name }}"
                    data-location="{{ dc.location }}"
                    data-region="{{ dc.region.id }}"
                    style="cursor:pointer;">
                    <td>{{ dc.name }}</td>
                    <td>{{ dc.location }}</td>
                    <td>{{ dc.region }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>

</div>
</div>

<!-- Modal -->
<div class="modal fade" id="dataCenterModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Data Center</h5>
        <button type="button" class="close" data-dismiss="modal">
          <span>&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <form method="post" id="dataCenterForm">
          {% csrf_token %}
          <div class="row g-2">
            {% for field in form %}
              <div class="col-md-6">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
              </div>
            {% endfor %}
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-danger" id="deleteDataCenterBtn" style="display:none;">Delete</button>
        <button class="btn btn-custom-blue" type="submit" form="dataCenterForm">Save</button>
        <button class="btn btn-custom-blue" data-dismiss="modal">Cancel</button>
      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("dataCenterForm");
    const deleteBtn = document.getElementById("deleteDataCenterBtn");

    // NEW DATA CENTER
    document.getElementById("newDataCenterBtn").addEventListener("click", function () {
        form.reset();
        deleteBtn.style.display = "none";
        form.removeAttribute("data-id");  // no id for new
        $("#dataCenterModal .modal-title").text("Add Data Center");
        $("#dataCenterModal").modal("show");
    });

    // EDIT DATA CENTER
    document.querySelectorAll(".datacenter-row").forEach(row => {
        row.addEventListener("click", function () {
            form.dataset.id = row.dataset.id;

            form.querySelector("#id_name").value = row.dataset.name;
            form.querySelector("#id_location").value = row.dataset.location;
            form.querySelector("#id_region").value = row.dataset.region;

            deleteBtn.style.display = "inline-block";
            deleteBtn.dataset.id = row.dataset.id;

            $("#dataCenterModal .modal-title").text("Edit Data Center");
            $("#dataCenterModal").modal("show");
        });
    });

    // AJAX CREATE/UPDATE
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const id = form.dataset.id;
        let url = "{% url 'datacenter-list' %}";
        let method = "POST";

        if (id) {
            url += id + "/";
            method = "PUT";
        }

        fetch(url, {
            method: method,
            headers: {
                "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value,
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                name: form.querySelector("#id_name").value,
                location: form.querySelector("#id_location").value,
                region: form.querySelector("#id_region").value,
            })
        })
        .then(res => {
            if(res.ok) location.reload();
            else alert("Failed to save data center");
        })
        .catch(err => alert("Error: " + err));
    });

    // DELETE
    deleteBtn.addEventListener("click", function () {
        const id = this.dataset.id;
        if (!id) return;

        if (confirm("Are you sure you want to delete this data center?")) {
            fetch(`{% url 'datacenter-list' %}` + `${id}/`, {
                method: "DELETE",
                headers: {
                    "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value,
                },
            }).then(res => {
                if(res.ok) location.reload();
                else alert("Failed to delete data center");
            });
        }
    });

});
</script>

<script>
window.addEventListener("load", function () {
    document.getElementById("page-loader").style.display = "none";
});
</script>

{% endblock %}
