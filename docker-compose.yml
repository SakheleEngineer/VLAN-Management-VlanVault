version: '3.9'

services:
  web:
    build: .
    container_name: django_app
    command: gunicorn comsol_tag_manager.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --preload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: celery_worker
    command: celery -A comsol_tag_manager worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis

  celery-beat:
    build: .
    container_name: celery_beat
    command: celery -A comsol_tag_manager beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis